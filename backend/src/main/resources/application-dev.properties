# Development profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=dev-secret-key-minimum-256-bits-for-hs256-algorithm-padding-here
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
