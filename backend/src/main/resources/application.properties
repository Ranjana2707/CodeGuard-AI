# Server
server.port=8080
spring.application.name=codeguard-ai

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/codeguard}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:codeguard-super-secret-key-change-in-production-min-256-bits}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# AI Config
app.ai.api-key=${AI_API_KEY:}
app.ai.model=${AI_MODEL:claude-sonnet-4-20250514}
app.ai.provider=${AI_PROVIDER:anthropic}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.codeguard=INFO
logging.level.org.springframework.security=WARN
