# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=test-secret-key-minimum-256-bits-for-hs256-algorithm-padding-here
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=7200000

app.ai.api-key=test-key
app.ai.model=claude-sonnet-4-20250514
